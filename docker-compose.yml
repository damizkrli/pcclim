services:
  php:
    container_name: pcclim_php
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: prod

  nginx:
    container_name: pcclim_nginx
    image: nginx:stable-alpine
    ports:
      - "8082:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - .:/var/www/html
    depends_on:
      - php
