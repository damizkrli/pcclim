name: Deploy Symfony project to production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Sync project files with server (rsync)
        run: |
          rsync -az --delete \
          -e "ssh -o StrictHostKeyChecking=no" \
          ./ ubuntu@${{ secrets.SERVER_HOST }}:/var/www/pcclim/

      - name: Build & Restart Docker containers on server
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.SERVER_HOST }} << 'EOF'
            cd /var/www/pcclim
            docker compose down -v --remove-orphans
            docker compose up -d --build
            docker exec pcclim_php php bin/console cache:clear
          EOF
