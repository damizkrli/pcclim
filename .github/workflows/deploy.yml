name: Déploiement production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Cloner le dépôt
        uses: actions/checkout@v4

      - name: 🔐 Configurer la clé SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🚀 Déployer le code via rsync
        run: |
          rsync -az --delete \
            --exclude=".git" \
            --exclude="node_modules" \
            --exclude="vendor" \
            --exclude="tools/php-cs-fixer/vendor" \
            --exclude="var" \
            --exclude=".github" \
            --exclude=".env.local" \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ ubuntu@ip-172-26-5-94:/var/www/pcclim/

      - name: 🐳 Reconstruire les conteneurs sur le serveur distant
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@ip-172-26-5-94 << 'EOF'
            cd /var/www/pcclim
            docker compose down -v --remove-orphans
            docker compose up -d --build
          EOF
